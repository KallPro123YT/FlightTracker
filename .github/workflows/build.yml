name: Build Unsigned iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode Project
      run: xcodegen generate

    - name: Build iOS Application
      run: |
        xcodebuild clean build \
          -project FlightTracker.xcodeproj \
          -scheme FlightTracker \
          -sdk iphoneos \
          -configuration Release \
          SYMROOT=build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER=""

    - name: Package Unsigned IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/FlightTracker.app Payload/
        zip -r FlightTracker.ipa Payload

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FlightTracker-IPA
        path: FlightTracker.ipa
